<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobox Studio Pro HD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="controls">
            <h2>⚙️ Control Panel</h2>
            <div class="control-section">
                <h3>Magic Auto-Detect</h3>
                <label class="btn-upload magic">✨ Scan Template PNG
                    <input type="file" id="magicScan" accept="image/png">
                </label>
            </div>
            <div class="control-section">
                <h3>Simpan Hasil</h3>
                <button id="downloadBtn" class="download-btn">💾 DOWNLOAD HD (4R)</button>
            </div>
        </aside>

        <main class="preview-area">
            <div id="captureArea" class="photo-strip">
                <div id="photoContainer"></div>
                <img id="templateOverlay">
            </div>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
