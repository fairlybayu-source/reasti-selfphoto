<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobox AI Precision</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="controls">
            <h2>⚙️ Panel Kontrol</h2>
            <div class="control-section">
                <h3>Magic Auto-Detect</h3>
                <label class="btn-upload magic">✨ Scan Template PNG
                    <input type="file" id="magicScan" accept="image/png">
                </label>
            </div>
            <div class="control-section">
                <h3>Layout Standar</h3>
                <button onclick="changeLayout('layout-strip')">🎞️ Strip</button>
                <button onclick="changeLayout('layout-grid')">📱 Grid 2x3</button>
            </div>
            <button id="downloadBtn" class="download-btn">💾 SIMPAN HASIL HD</button>
        </aside>

        <main class="preview-area">
            <div id="captureArea" class="photo-strip white">
                <img id="templateOverlay">
                <div id="photoContainer"></div>
            </div>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
