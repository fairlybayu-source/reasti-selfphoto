<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Photobox Studio HD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Ultimate Photobox Maker</h1>
            <p>Pilih Layout, Geser Foto untuk Atur Posisi, dan Simpan HD</p>
        </header>
        
        <div class="main-layout">
            <aside class="controls">
                <div class="control-section">
                    <h3>1. Pilih Layout Template</h3>
                    <div class="layout-selector">
                        <button onclick="changeLayout('layout-strip')">🎞️ Strip</button>
                        <button onclick="changeLayout('layout-grid')">📱 Grid 2x3</button>
                        <button onclick="changeLayout('layout-double')">🖼️ Double</button>
                        <button onclick="changeLayout('layout-grand-opening')" class="special">✨ Grand Opening</button>
                    </div>
                    <label class="btn-upload">📸 Pilih Foto<input type="file" id="imageInput" accept="image/*" multiple></label>
                </div>

                <div class="control-section">
                    <h3>2. Frame & Desain</h3>
                    <select id="bgSelect" onchange="changeBg(this.value)">
                        <option value="white">Putih Polos</option>
                        <option value="black">Hitam Elegan</option>
                        <option value="polka-pink">Pink Polkadot</option>
                        <option value="grad-sunset">Sunset Glow</option>
                    </select>
                    <select id="filterSelect" onchange="applyFilter()">
                        <option value="none">Tanpa Filter</option>
                        <option value="grayscale(100%)">B&W Retro</option>
                        <option value="sepia(60%)">Vintage</option>
                    </select>
                    <label class="btn-upload secondary">🖼️ Ganti Logo PNG<input type="file" id="logoInput" accept="image/*"></label>
                </div>

                <div class="control-section">
                    <h3>3. Tambah Stiker</h3>
                    <div class="sticker-bank">
                        <button onclick="addSticker('❤️')">❤️</button><button onclick="addSticker('✨')">✨</button>
                        <button onclick="addSticker('🌸')">🌸</button><button onclick="addSticker('🎀')">🎀</button>
                        <button onclick="addSticker('🐶')">🐶</button>
                    </div>
                </div>

                <button id="downloadBtn" class="download-btn">💾 SIMPAN HASIL HD (4R)</button>
            </aside>

            <main class="preview-area">
                <div id="captureArea" class="photo-strip white layout-strip">
                    <div class="split-bg"></div>
                    <div class="header-text">GRAND OPENING</div>
                    <div class="dots-left">●●●</div>
                    <div class="dots-right">●●●</div>

                    <div id="photoContainer"></div>

                    <div id="logoWrapper">
                        <img id="userLogo" src="" style="display:none;">
                        <div class="branding-text">Reastic Studio</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
